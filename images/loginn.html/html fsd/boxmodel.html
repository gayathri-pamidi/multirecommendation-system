<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Image Alignment</title>

    <style>
        .container{
            height: 90vh;
            display: flex;
            flex-direction: row;
            align-items: flex-start;      /* top alignment */
            justify-content: flex-start;  /* left alignment */
            border: 2px solid black;
        }

        .box{
            height: 120px;
            width: 120px;
            margin: 20px;
            border: 2px solid black;
            border-radius: 10px;

            display: flex;               /* important */
            justify-content: center;     /* horizontal center */
            align-items: center;         /* vertical center */
            overflow: hidden;            /* prevent overflow */
        }

        .box img{
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;         /* keeps image inside box */
        }

     
    </style>
</head>

<body>
    <div class="container">
        <div class="box box1">
            <img src="image1.webp" alt="">
        </div>
        <div class="box box2">
            <img src="image2.jpg" alt="">
        </div>
        <div class="box box3">
            <img src="image3.webp" alt="">
        </div>
    </div>
</body>
</html>
