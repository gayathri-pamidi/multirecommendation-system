<!DOCTYPE html>
<html>
    <head>
        <title>document</title>
        <style>
             .header{background-color: brown;
             grid-row: 1/2;
            grid-column: 1/4;}

            .navbar{background-color: aquamarine;}
            .content{background-color:coral;}        
            .aside{background-color: blueviolet;}
            .footer{background-color: beige;
            grid-column: 1/4;}
            .container{
                height: 95vh;
                display: grid;
                grid-template-rows: 10% 80% 10%;
                grid-template-columns: 10% 80% 10%;

            }
            .zig{
                display: flex;
                justify-content: center;
                align-items: center;
                border: 2px dashed black;
            }
            </style>
    </head>
    <body>
        <div class="container">
        <div class="zig header">header</div>
        <div class="zig navbar">navbar</div>
        <div class="zig content">content</div>
        <div class="zig aside">aside</div>
        <div class="zig footer">footer</div>
        </div>
    </body>
</html>
