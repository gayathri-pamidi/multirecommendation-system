<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            padding: 8px 13px;
            border:0px;
            background-color: rgb(248, 215, 28);
            margin: 50px;
            border-radius: 12%;
            transition: all;
            transition-duration: 1s;
            transition-timing-function: cubic-bezier(0.075, 0.82, 0.165, 1);
        }
        button:hover{
            cursor: pointer;
            transform: scale(1.2);
            background-color: rgb(216, 247, 44);
            color: hotpink;
            box-shadow: 2px 2px rgb(253, 249, 30);
        }
    </style>
</head>
<body>
    <button>
        Click Me
    </button>
</body>
</html>
