<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 150px;
            width: 150px;
            border: 50 solid rgb(18, 215, 230) ;
            border-radius: 50%;
            margin:75px;
            border-top: 10px solid rgb(36, 48, 218);
            animation: spin 1s linear infinite normal;
        }
        @keyframes spin {
            0%{
                transform: rotate(0deg);
            }
            100%{
                transform: rotate(360deg);
            }

        }
    </style>
</head>
<body>
    <div class="container"></div>
</body>
</html>
